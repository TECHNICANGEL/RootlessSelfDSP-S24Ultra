name: Android CI Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Rootless Version
        run: ./gradlew assembleRootlessFullRelease

      - name: Locate and Prepare APK
        run: |
          mkdir -p release_apks
          echo \"Searching for generated APKs...\"
          # Find all APKs and list them for debugging
          ALL_APKS=$(find app/build/outputs/apk/ -name \"*.apk\")
          echo \"Found APKs:\"
          echo \"$ALL_APKS\"
          
          # Prioritize the universal APK if it exists, otherwise take the first one
          UNIVERSAL_APK=$(find app/build/outputs/apk/ -name \"*-universal-release.apk\" | head -n 1)
          FLAVOR_APK=$(find app/build/outputs/apk/ -name \"*rootlessFull-release.apk\" | head -n 1)
          
          if [ -n \"$UNIVERSAL_APK\" ]; then
            echo \"Using universal APK: $UNIVERSAL_APK\"
            cp \"$UNIVERSAL_APK\" release_apks/JamesDSP-v2.0.0-ultra-rootless.apk
          elif [ -n \"$FLAVOR_APK\" ]; then
            echo \"Using flavor APK: $FLAVOR_APK\"
            cp \"$FLAVOR_APK\" release_apks/JamesDSP-v2.0.0-ultra-rootless.apk
          elif [ -n \"$ALL_APKS\" ]; then
            FIRST_APK=$(echo \"$ALL_APKS\" | head -n 1)
            echo \"Using first found APK: $FIRST_APK\"
            cp \"$FIRST_APK\" release_apks/JamesDSP-v2.0.0-ultra-rootless.apk
          else
            echo \"ERROR: No APK files found!\"
            exit 1
          fi
          
          echo \"Final APK prepared at release_apks/JamesDSP-v2.0.0-ultra-rootless.apk\"
          ls -lh release_apks/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_apks/JamesDSP-v2.0.0-ultra-rootless.apk
          name: Release ${{ github.ref_name }} (Legacy S24 Ultra Edition)
          body: |
            ## 💎 DSP ULTRA - S24 Ultra Legacy Release

            This release contains the complete APK for the S24 Ultra Legacy Edition.

            ### 💎 CORE FEATURE: REAL-TIME MUSICAL STEM SEPARATION 💎
            This version includes advanced ONNX models (4-stem separation) optimized for the Hexagon HTP and Adreno GPU of the Snapdragon 8 Gen 3.
            *   **Separación Musical por Stems en Tiempo Real**: Separa voz, batería, bajo y otros instrumentos instantáneamente con calidad profesional.

            ### Optimized for:
            - **Samsung Galaxy S24 Ultra (SD 8 Gen 3 \"for Galaxy\")**
            - **Cortex-X4 @ 3.39GHz**
            - **12GB+ LPDDR5X RAM**

            ### Installation:
            Download the `JamesDSP-v2.0.0-ultra-rootless.apk` and install it on your device.
            *Requires Android 15+*

            [Support the Developer (PayPal)](https://www.paypal.com/cgi-bin/webscr?cmd=_donations&business=drifterself01@gmail.com&currency_code=USD&source=url)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
