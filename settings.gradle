pluginManagement {
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}
plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '1.0.0'
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        maven { url "https://jitpack.io" }
        // Qualcomm AI Engine Direct (QNN) - for onnxruntime-android-qnn
        maven { url "https://qpm.qualcomm.com/maven-r/qpm-public" }
    }
}

rootProject.name = "RootlessJamesDSP"
include ':app'
include ':codeview'
include ':hidden-api-stubs'
include ':hidden-api-impl'
include ':hidden-api-refined'
